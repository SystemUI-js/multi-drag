name: Publish to npm (version branches)

on:
  push:
    branches:
      - 'version/*'

permissions:
  contents: read

jobs:
  publish:
    name: Build and Publish Packages
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 安装 Node，并配置 npm registry（用于 npm publish 鉴权）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: yarn

      # 使用 Yarn 安装依赖（项目包含 yarn.lock）
      - name: Install dependencies
        run: |
          corepack enable
          yarn --version
          yarn install --frozen-lockfile

      # 解析分支类型、收集待发布包信息，并校验版本一致性
      - name: Classify branch and collect package metadata
        id: packages
        shell: bash
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          BRANCH_VERSION="${BRANCH#version/}"

          CORE_NAME=$(node -e "console.log(JSON.parse(require('fs').readFileSync('packages/multi-drag-core/package.json','utf8')).name)")
          CORE_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('packages/multi-drag-core/package.json','utf8')).version)")
          WEB_NAME=$(node -e "console.log(JSON.parse(require('fs').readFileSync('packages/multi-drag/package.json','utf8')).name)")
          WEB_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('packages/multi-drag/package.json','utf8')).version)")

          echo "Detected branch: $BRANCH"
          echo "Branch version: $BRANCH_VERSION"
          echo "Core package: $CORE_NAME@$CORE_VERSION"
          echo "Web package: $WEB_NAME@$WEB_VERSION"

          if [[ "$CORE_VERSION" != "$WEB_VERSION" ]]; then
            echo "Package versions must stay in sync: $CORE_VERSION != $WEB_VERSION"
            exit 1
          fi

          if [[ "$BRANCH_VERSION" != "$CORE_VERSION" ]]; then
            echo "Branch version $BRANCH_VERSION does not match package version $CORE_VERSION"
            exit 1
          fi

          if [[ "$CORE_VERSION" =~ -dev ]]; then
            PUBLISH_TAG='dev'
            echo 'Version type: Dev Pre-release'
          elif [[ "$CORE_VERSION" =~ -beta ]]; then
            PUBLISH_TAG='beta'
            echo 'Version type: Beta Pre-release'
          else
            PUBLISH_TAG='latest'
            echo 'Version type: Release'
          fi

          echo "PUBLISH_TAG=$PUBLISH_TAG" >> "$GITHUB_ENV"
          echo "publish_tag=$PUBLISH_TAG" >> "$GITHUB_OUTPUT"
          echo "core_name=$CORE_NAME" >> "$GITHUB_OUTPUT"
          echo "core_version=$CORE_VERSION" >> "$GITHUB_OUTPUT"
          echo "web_name=$WEB_NAME" >> "$GITHUB_OUTPUT"
          echo "web_version=$WEB_VERSION" >> "$GITHUB_OUTPUT"

      # 检查两个包的版本是否已发布；已发布则单独跳过，避免重复发布导致失败
      - name: Check package publish status
        id: publish_status
        shell: bash
        run: |
          CORE_NAME='${{ steps.packages.outputs.core_name }}'
          CORE_VERSION='${{ steps.packages.outputs.core_version }}'
          WEB_NAME='${{ steps.packages.outputs.web_name }}'
          WEB_VERSION='${{ steps.packages.outputs.web_version }}'

          if npm view "$CORE_NAME@$CORE_VERSION" version > /dev/null 2>&1; then
            CORE_SHOULD_PUBLISH='false'
            echo "Version already exists, skip: $CORE_NAME@$CORE_VERSION"
          else
            CORE_SHOULD_PUBLISH='true'
            echo "Version not found, will publish: $CORE_NAME@$CORE_VERSION"
          fi

          if npm view "$WEB_NAME@$WEB_VERSION" version > /dev/null 2>&1; then
            WEB_SHOULD_PUBLISH='false'
            echo "Version already exists, skip: $WEB_NAME@$WEB_VERSION"
          else
            WEB_SHOULD_PUBLISH='true'
            echo "Version not found, will publish: $WEB_NAME@$WEB_VERSION"
          fi

          if [[ "$CORE_SHOULD_PUBLISH" == 'true' || "$WEB_SHOULD_PUBLISH" == 'true' ]]; then
            echo 'should_publish_any=true' >> "$GITHUB_OUTPUT"
          else
            echo 'should_publish_any=false' >> "$GITHUB_OUTPUT"
          fi

          echo "core_should_publish=$CORE_SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "web_should_publish=$WEB_SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browsers
        if: steps.publish_status.outputs.should_publish_any == 'true'
        run: |
          npx playwright install --with-deps chromium

      # 预先执行完整校验，提前暴露 prepublishOnly 依赖的测试与构建错误
      - name: Validate project before publish
        if: steps.publish_status.outputs.should_publish_any == 'true'
        run: |
          yarn test:all
          yarn build:all

      - name: Publish @system-ui-js/multi-drag-core
        if: steps.publish_status.outputs.core_should_publish == 'true'
        working-directory: packages/multi-drag-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --tag "$PUBLISH_TAG" --access public

      - name: Publish @system-ui-js/multi-drag
        if: steps.publish_status.outputs.web_should_publish == 'true'
        working-directory: packages/multi-drag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --tag "$PUBLISH_TAG" --access public

      # 确保预发布标签的 dist-tag 指向当前 version（支持 dev 和 beta）
      - name: Ensure pre-release dist-tag for core
        if: (env.PUBLISH_TAG == 'dev' || env.PUBLISH_TAG == 'beta') && steps.publish_status.outputs.core_should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME='${{ steps.packages.outputs.core_name }}'
          VERSION='${{ steps.packages.outputs.core_version }}'
          echo "Ensure dist-tag: ${PUBLISH_TAG} -> $PKG_NAME@$VERSION"
          npm dist-tag add "$PKG_NAME@$VERSION" "$PUBLISH_TAG" || true
          npm dist-tag ls "$PKG_NAME"

      - name: Ensure pre-release dist-tag for web
        if: (env.PUBLISH_TAG == 'dev' || env.PUBLISH_TAG == 'beta') && steps.publish_status.outputs.web_should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME='${{ steps.packages.outputs.web_name }}'
          VERSION='${{ steps.packages.outputs.web_version }}'
          echo "Ensure dist-tag: ${PUBLISH_TAG} -> $PKG_NAME@$VERSION"
          npm dist-tag add "$PKG_NAME@$VERSION" "$PUBLISH_TAG" || true
          npm dist-tag ls "$PKG_NAME"
